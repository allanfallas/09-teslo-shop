<div class="navbar bg-base-100 shadow-sm">
  <div class="navbar-start">
    <div class="dropdown">
      <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
        </svg>
      </div>
      <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li>
          <a routerLink="/gender/man" routerLinkActive="text-secondary" class="btn btn-ghost">Men</a>
        </li>
        <li>
          <a routerLink="/gender/woman" routerLinkActive="text-secondary" class="btn btn-ghost">Women</a>
        </li>
        <li>
          <a routerLink="/gender/kids" routerLinkActive="text-secondary" class="btn btn-ghost">Kids</a>
        </li>
      </ul>
    </div>
    <a routerLink="/" class="btn btn-ghost text-xl">
      <div class="btn btn-ghost text-xl font-Montserrat">
        Teslo
      </div><span class="text-secondary">| Shop</span>
    </a>
  </div>
  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1">
      <li>
        <a routerLink="/gender/men" routerLinkActive="text-secondary" class="btn btn-ghost">Men</a>
      </li>
      <li>
        <a routerLink="/gender/women" routerLinkActive="text-secondary" class="btn btn-ghost">Women</a>
      </li>
      <li>
        <a routerLink="/gender/kid" routerLinkActive="text-secondary" class="btn btn-ghost">Kids</a>
      </li>
    </ul>
  </div>
  <div class="navbar-end">

    @if ( authService.isAdmin() ){
    <a class="btn btn-accent" routerLink="/admin">Admin Panel</a>
    }

    @if ( authService.authStatus() === 'authenticated' ) {
    <button class="btn btn-ghost">{{authService.user()!.fullName}}</button>
    <button class="btn btn-sm btn-error" (click)="authService.logout()">Logout</button>

    }@else if ( authService.authStatus() === 'not-authenticated') {
    <a class="btn btn-secondary" [routerLink]="['/auth/login']">Login</a>
    }@else{
    <a class="btn btn-ghost">...</a>
    }
  </div>
</div>
