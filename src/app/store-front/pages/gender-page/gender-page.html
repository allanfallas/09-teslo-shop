<h1 class="text-3xl font-bold font-monzerat capitalize">{{`${gender()}'s departament`}}</h1>
<h1 class="text-xl mb-5">For all tastes</h1>


<app-pagination 
[pages]="productsResource.value()?.pages ?? 0"
[currentPage]="paginationService.currentPage()"
></app-pagination>

<div class="grid grid-cols-1 gap-5 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
  
@for (product of productsResource.value()?.products; track product.id) {
  <app-product-card [product]="product"></app-product-card>
}

</div>

<app-pagination 
[pages]="productsResource.value()?.pages ?? 0"
[currentPage]="paginationService.currentPage()"
></app-pagination>
