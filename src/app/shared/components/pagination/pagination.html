<div class="join flex justify-center items-center mb-4">
    @for (page of getPagesList(); track page) {
    <button class="join-item btn" [class.btn-primary]="page === activePage()" [routerLink]="[]"
        [queryParams]="{page: page}" (click)="activePage.set(page)">

        {{page}}

    </button>

    }
    @empty {
        <div class="flex justify-center items-center h-screen">
            <span class="loading loading-spinner loading-lg"></span>
        </div>
    }
</div>
