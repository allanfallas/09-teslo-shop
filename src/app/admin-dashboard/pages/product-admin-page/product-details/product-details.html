<h1 class="text-2xl font-bold">{{ product().title }}</h1>
<div class="divider"></div>

<form [formGroup]="productForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4" (ngSubmit)="onSubmit()">
    <!-- Datos generales -->
    <div class="flex flex-col gap-2">
        <h2 class="text-2xl font-bold h-12">Main info</h2>
        <input type="text" placeholder="Title" class="input input-bordered w-full" formControlName="title"
            [class.border-red-500]="productForm.get('title')?.errors" />
        <form-error-label [control]="productForm.get('title')!"></form-error-label>
        <input type="text" placeholder="Slug" class="input input-bordered w-full" formControlName="slug"
            [class.border-red-500]="productForm.get('slug')?.errors" />
        <form-error-label [control]="productForm.get('slug')!"></form-error-label>

        <textarea class="textarea textarea-bordered" placeholder="Description" rows="6" formControlName="description"
            [class.border-red-500]="productForm.get('description')?.errors"></textarea>
        <form-error-label [control]="productForm.get('description')!"></form-error-label>

        <h2 class="text-lg font-bold">Selling info</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <div>
                <label class="label">Price</label>
                <input type="number" placeholder="Price" class="input input-bordered w-full" formControlName="price"
                    [class.border-red-500]="productForm.get('price')?.errors" />
                <form-error-label [control]="productForm.get('price')!"></form-error-label>
            </div>
            <div>
                <label class="label">Stock</label>
                <input type="number" placeholder="Stock" class="input input-bordered w-full"
                    formControlName="stock" [class.border-red-500]="productForm.get('stock')?.errors" />
                <form-error-label [control]="productForm.get('stock')!"></form-error-label>

            </div>
        </div>

        <!-- tags -->
         
        <label class="label">Tags</label>
        <input type="text" placeholder="Tags" class="input input-bordered w-full" formControlName="tags"
            [class.border-red-500]="productForm.get('tags')?.errors" />
        <form-error-label [control]="productForm.get('tags')!"></form-error-label>

        <!-- Botones para el género -->
        <div class="grid grid-cols-4 gap-2">
            <!-- <button class="btn btn-sm btn-outline">Masculino</button> -->
            <button class="btn btn-sm btn-primary" type="button"
                [class.btn-primary]="productForm.value.gender === 'men'"
                (click)="productForm.patchValue({ gender : 'men' })">Men</button>
            <button class="btn btn-sm" type="button" [class.btn-accent]="productForm.value.gender === 'women'"
                (click)="productForm.patchValue({ gender : 'women' })">Women</button>
            <button class="btn btn-sm" type="button" [class.btn-warning]="productForm.value.gender === 'kid'"
                (click)="productForm.patchValue({ gender : 'kid' })">Kids</button>
            <button class="btn btn-sm" type="button" [class.btn-secondary]="productForm.value.gender === 'unisex'"
                (click)="productForm.patchValue({ gender : 'unisex' })">Unisex</button>
        </div>

        <!-- Sizes -->
        <div class="grid grid-cols-6 gap-2">
            @for (size of sizes; track size) {
            <button class="btn btn-sm btn-outline" type="button"
                [class.btn-secondary]="productForm.value.sizes?.includes(size)" (click)="onSizeChange(size)">{{ size
                }}</button>
            }
        </div>
    </div>

    <!-- Imágenes -->
    <div class="flex flex-col gap-2">
        <div class="flex justify-end h-12">
            <button class="btn btn-secondary" type="submit">
                <!-- <span class="loading loading-spinner loading-sm"></span> -->

                Save
            </button>
        </div>

        <product-carrousel [images]="productImages()" />

        <input type="file" multiple accept="image/*" class="file-input file-input-bordered w-full mt-4"
            (change)="onFilesChanged($event)" />

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
            @for (image of tempImages(); track image) {
            <img [src]="image" alt="Temporal image" class="w-full object-cover rounded-xl mt-2" />
            }
        </div>
    </div>
</form>
@if (wasSaved()) {
<div class="alet alert-success fixed bottom-4 right-4 w-80 animate-fadeIn">
    <span>Data updated succesfully</span>
</div>
}
