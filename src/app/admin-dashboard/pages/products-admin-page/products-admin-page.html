<h1 class="text-2xl font-bold">Product list</h1>
<h3 class="text-xl">total

    <span class="text-accent">{{ productsResource.value()?.count }}</span>
</h3>

<div class="overflow-x-auto">
    <div class="divider"></div>

    <div class="flex gap-2 items-center h-20">

        <app-pagination [pages]="productsResource.value()?.pages ?? 0"
            [currentPage]="paginationService.currentPage()"></app-pagination>
        
        <select class="p-4" (change)="productPerPage.set(+perPageSelect.value)" #perPageSelect>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>

        <div class="flex flex-1"></div>

        <button class="btn btn-primary" routerLink="/admin/products/new">
            New product
        </button>

    </div>

    <app-product-table [products]="productsResource.value()?.products ?? []"></app-product-table>
